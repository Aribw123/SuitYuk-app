<ion-content class="wood-bg">
  <!-- Top Bar -->
  <div class="top-bar">
    <ion-button fill="clear" class="icon-btn info-btn">
      <ion-icon name="information-circle-outline"></ion-icon>
    </ion-button>
    <div class="top-right">
      <ion-button fill="clear" class="flag-btn">🇮🇩</ion-button>
      <ion-button fill="clear" class="icon-btn sound-btn">
        <ion-icon name="volume-high-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <!-- Title Banner -->
  <div class="banner-wrap">
    <div class="banner pixel-border">
      <h1 class="banner-title">BATU<br>KERTAS<br>GUNTING!</h1>
    </div>
  </div>

  <p class="retro-subtitle">— RETRO EDITION —</p>
  <div class="emoji-row">🪨 ✂️ 📄</div>

   <!-- Panels + Tangan SVG Inline -->
 <div class="panels-area">
    <div class="panel panel-blue"></div>
    <div class="panel panel-green"></div>
    <div class="panel panel-red"></div>

  </div>


  <!-- Play Buttons -->
  <div class="play-btns">
    <button type="button" class="play-btn-wrap" (click)="goToMode()">
      <div class="play-btn-inner pixel-border-green">
        <ion-icon name="play" class="play-icon"></ion-icon>
      </div>
      <div class="play-btn-label">MAIN SENDIRI</div>
    </button>
  </div>

  <p class="bottom-label">✦ PILIH MODE UNTUK MULAI ✦</p>

  <!-- Pixel star decorations -->
  <div class="pstar" style="top:80px; left:20px; animation-delay:0s"></div>
  <div class="pstar" style="top:100px; right:28px; animation-delay:0.5s"></div>
  <div class="pstar" style="top:260px; left:14px; animation-delay:1s"></div>
  <div class="pstar" style="top:280px; right:16px; animation-delay:0.8s"></div>
</ion-content>
